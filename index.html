<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      if (typeof window !== 'undefined') {
        window.global = window;
        // Prevent cross-fetch or other libraries from overriding fetch if it's read-only
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: false,
            enumerable: true,
            get: () => originalFetch,
            set: () => { console.warn('Something tried to override fetch, ignored.'); }
          });
        } catch (e) {
          console.error('Failed to harden fetch:', e);
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
